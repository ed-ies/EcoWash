name: Build WPF Windows

# Ejecutar solo cuando se crea un tag tipo v1.0.0
on:
  push:
    tags:
      - "v*"

jobs:

  build:

    # Usamos runner Windows oficial de GitHub
    runs-on: windows-latest

    env:
      BUILD_CONFIGURATION: Release

    steps:

    # Descargar repositorio
    - name: Checkout repository
      uses: actions/checkout@v4

    # Instalar .NET 8
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # Restaurar dependencias NuGet
    - name: Restore dependencies
      run: dotnet restore EcoWash.sln

    # Ejecutar tests unitarios
    - name: Run tests
      run: dotnet test EcoWash.sln --configuration $env:BUILD_CONFIGURATION

    # Publicar aplicación WPF
    - name: Publish Windows build
      run: |
        dotnet publish EcoWash/EcoWash.csproj `
          -c $env:BUILD_CONFIGURATION `
          -r win-x64 `
          --self-contained true `
          /p:PublishSingleFile=true `
          /p:IncludeNativeLibrariesForSelfExtract=true `
          -o publish

    # Crear ZIP con el ejecutable
    - name: Create ZIP package
      run: |
        Compress-Archive `
          -Path publish\* `
          -DestinationPath EcoWash-${{ github.ref_name }}.zip

    # Subir ZIP como artifact
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: EcoWash-${{ github.ref_name }}
        path: EcoWash-*.zip

    # Crear Release automática en GitHub
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: EcoWash-*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}