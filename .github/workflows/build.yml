name: Build WPF Linux

# Se activa solo cuando se crea un TAG tipo v1.0.0
on:
  push:
    tags:
      - "v*"

jobs:

  build:

    # Ejecutar en Linux
    runs-on: ubuntu-latest

    # Configuración de compilación
    env:
      BUILD_CONFIGURATION: Release

    steps:

    # Descarga el repositorio
    - name: Checkout repository
      uses: actions/checkout@v4

    # Instala .NET 8
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # Descarga dependencias NuGet
    - name: Restore dependencies
      run: dotnet restore EcoWash.sln

    # Ejecuta los tests
    - name: Run tests
      run: dotnet test EcoWash.sln --configuration $BUILD_CONFIGURATION

    # Genera el .exe portable
    - name: Publish Windows build
      run: |
        dotnet publish EcoWash/EcoWash.csproj \
          -c $BUILD_CONFIGURATION \
          -r win-x64 \
          --self-contained true \
          /p:PublishSingleFile=true \
          /p:IncludeNativeLibrariesForSelfExtract=true \
          -o publish

    # Crear ZIP
    - name: Create ZIP package
      run: |
        zip -r EcoWash-${{ github.ref_name }}.zip publish/

    # Subir artifact
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: EcoWash-${{ github.ref_name }}
        path: EcoWash-*.zip

    # Crear Release automáticamente
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: EcoWash-*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}